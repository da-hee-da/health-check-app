{% extends "auth_base.html" %}

{% block title %}
  <title>로그인</title>
{% endblock %}

{% block content %}

<div class="text-center mb-4">
  <h2 class="font-weight-bold text-primary">건강검진 서비스</h2>
  <p class="text-muted">로그인하고 서비스를 시작하세요</p>
</div>

<form class="user" method="POST" action="{{ url_for('auth.signIn') }}">

  <div class="form-group mb-3">
    <input
      type="email"
      name="email"
      class="form-control form-control-user"
      placeholder="이메일"
      required
    />
  </div>

  <div class="form-group mb-4">
    <input
      type="password"
      name="password"
      class="form-control form-control-user"
      placeholder="비밀번호"
      required
    />
  </div>

  <button type="submit"
    class="btn btn-primary btn-user btn-block"
    style="border-radius: 10px; padding: 10px;">
    로그인
  </button>

</form>

<hr />

<div class="text-center">
  <a class="small text-primary" href="{{ url_for('auth.signUp') }}">
    아직 회원이 아니신가요?
  </a>
</div>

{% endblock %}
