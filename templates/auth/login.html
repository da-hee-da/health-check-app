<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>건강검진 로그인</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>

<body>

  <div class="login-wrapper d-flex align-items-center justify-content-center">

    <div class="card login-card shadow-lg">

      <!-- Header -->
      <div class="card-header text-center bg-white border-0">
        <h3 class="fw-bold text-primary">🩺 건강검진 시스템</h3>
        <p class="text-muted mb-0">로그인 후 서비스를 이용하세요</p>
      </div>

      <!-- Body -->
      <div class="card-body p-4">

        <form method="POST" action="/login">

          <!-- ID -->
          <div class="mb-3">
            <label class="form-label">아이디</label>
            <input type="text" name="username" class="form-control" placeholder="아이디 입력" required>
          </div>

          <!-- PW -->
          <div class="mb-3">
            <label class="form-label">비밀번호</label>
            <input type="password" name="password" class="form-control" placeholder="비밀번호 입력" required>
          </div>

          <!-- Remember -->
          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="remember">
            <label class="form-check-label" for="remember">
              로그인 상태 유지
            </label>
          </div>

          <!-- Button -->
          <button type="submit" class="btn btn-primary w-100">
            로그인
          </button>

        </form>

      </div>

      <!-- Footer -->
      <div class="card-footer text-center bg-white border-0">
        <small class="text-muted">© 2026 Health Check System</small>
      </div>

    </div>

  </div>

</body>
</html>
